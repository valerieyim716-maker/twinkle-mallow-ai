services:
  - type: web
    name: twinkle-mallow-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FEISHU_WEBHOOK
        sync: false
      - key: TIKTOK_APP_KEY
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
